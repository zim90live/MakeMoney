# ─────────────────────────────────────────────────────────────
# 示例个人投资目标。复制到项目根目录的 investor_profile.yaml 再按自己情况填写：
#     cp examples/investor_profile.example.yaml investor_profile.yaml
# 真实 investor_profile.yaml 已被 .gitignore 忽略，不会进版本库。
# 收益目标不是承诺，只作为风险校准刻度。
# ─────────────────────────────────────────────────────────────

target_annual_return: 0.05        # 长期目标年化，例如 0.05 = 5%
horizon_years: 5                  # 计划至少持有/学习的年限
max_acceptable_drawdown: 0.15     # 心理上能接受的最大阶段亏损，例如 0.15 = 15%
experience_level: beginner        # beginner / intermediate / advanced
emergency_cash_kept_outside: 0    # 场外应急现金，不参与本工具配置
monthly_contribution: 0           # 每月计划追加资金
