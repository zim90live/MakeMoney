# ─────────────────────────────────────────────────────────────
# 观察池学习卡内容（教育用途，不是买入建议）。
# 与 strategy.yaml 的 watchlist 按 code 对应。这里是"科普内容"，
# 不是"策略参数"，所以单独成文件；可入库、可放心修改。
#
# 字段：
#   tracks    跟踪什么（一句话说清这只 ETF 背后是什么）
#   risks     主要风险（列点；新手最容易踩的坑）
#   goal      观察目标（这几周你该看懂什么，而不是该不该买）
#   questions 学习问题（能答上来，才算"看懂了"）
#
# 原则：观察池只用于学习与监控，永远不触发买卖；学完也只是"可以讨论是否纳入持仓池"，
#       仍需你手动决定并手动下单。
# ─────────────────────────────────────────────────────────────
cards:
  "511880":
    tracks: "场内货币基金（银华日利），相当于可在股票账户里买卖的“现金理财”，按日计息。"
    risks:
      - "收益随市场利率浮动，利率走低时收益跟着降。"
      - "极端情况下并非绝对保本（历史上极少，但不能当成银行存款）。"
      - "买卖也可能有极小的折溢价，盘中价格不完全等于净值。"
    goal: "理解它的角色是“闲钱停泊”，不是用来赚大钱；看懂收益大致跟着利率走。"
    questions:
      - "场内货币 ETF 和银行活期/余额宝有什么区别？"
      - "为什么说它“几乎无风险”而不是“绝对无风险”？"
  "511990":
    tracks: "另一只场内货币基金（华宝添益），用途与银华日利类似，都是现金管理工具。"
    risks:
      - "与其它货币 ETF 高度同质，差别主要在规模、流动性和折溢价。"
      - "收益同样随利率浮动，不保证固定回报。"
    goal: "学会在两只同类货币 ETF 之间比较：看规模、看成交活不活跃、看价格贴不贴近净值。"
    questions:
      - "两只货币 ETF 我该怎么选？要看哪些指标？"
      - "“规模太小”的 ETF 为什么要警惕？"
  "511360":
    tracks: "短融 ETF，背后是一篮子短期信用债（企业短期融资券），属于“现金增强”。"
    risks:
      - "有信用风险：发债企业若违约会拖累净值，所以它不等于现金。"
      - "利率/信用环境变化时，净值会小幅波动甚至回撤。"
      - "收益比货币基金高一点，是因为承担了额外风险，不是“免费的午餐”。"
    goal: "彻底理解“收益略高”背后多承担了什么风险，区分它和真正的现金。"
    questions:
      - "短融 ETF 为什么不等于现金？"
      - "什么是信用风险？它会怎样体现在净值上？"
  "513500":
    tracks: "标普 500 ETF（QDII），跟踪美国大盘股，是配置海外股票的“宽基核心”候选。"
    risks:
      - "QDII 溢价：额度紧张时场内价格可能明显高于净值，溢价买入相当于多付钱。"
      - "汇率风险：人民币兑美元波动会影响最终收益。"
      - "海外市场同样有大幅回撤的时候，不因为“是美股”就更安全。"
    goal: "看懂“溢价”是怎么回事，知道溢价高时宁可不买、等回落。"
    questions:
      - "QDII ETF 为什么会有溢价？溢价买入有什么坏处？"
      - "汇率波动会怎样影响我的实际收益？"
  "513100":
    tracks: "纳指 ETF（QDII），跟踪纳斯达克 100，以美国科技成长股为主，是“成长卫星”候选。"
    risks:
      - "波动比标普 500 更大，下跌时回撤更深。"
      - "同样有 QDII 溢价与汇率风险。"
      - "科技股估值高时更脆弱，情绪退潮容易大跌。"
    goal: "理解“成长=高波动”，明白它只适合小仓位、且要能扛住更大回撤。"
    questions:
      - "成长股为什么波动更大？"
      - "纳指和标普 500 的区别在哪里？哪个更“刺激”？"
  "159915":
    tracks: "创业板 ETF，跟踪 A 股创业板，偏成长风格（医药、新能源、科技等），是 A 股“成长卫星”候选。"
    risks:
      - "波动显著高于沪深 300，牛熊切换时大涨大跌。"
      - "成长风格在风险偏好下降时容易被“杀估值”。"
      - "行业集中度较高，单一板块利空会放大波动。"
    goal: "对比它和沪深 300 的波动差异，明白为什么它只能是“小仓位学习对象”。"
    questions:
      - "创业板为什么比沪深 300 波动大？"
      - "“杀估值”是什么意思？什么时候容易发生？"
  "588000":
    tracks: "科创 50 ETF，跟踪科创板硬科技龙头（半导体、高端制造等），属于 A 股“成长卫星”候选。"
    risks:
      - "高波动、行业高度集中于科技，景气周期影响大。"
      - "个股权重集中，少数龙头波动会主导整体涨跌。"
      - "题材热度退潮时回撤明显。"
    goal: "区分它和创业板的不同侧重，理解“越集中、越锋利”意味着风险也越大。"
    questions:
      - "科创 50 和创业板有什么区别？"
      - "“行业集中”为什么会放大波动风险？"
