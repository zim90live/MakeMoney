# ─────────────────────────────────────────────────────────────
# 策略骨架参数 —— 量化部分的"规则"。改这里相当于调策略，别频繁动。
# 读取方：engine/signals.py 和 engine/backtest.py（项目根目录的单份配置）。
# ─────────────────────────────────────────────────────────────

# 风险偏好（影响回测里"本策略"的推荐口径；live 周报始终把趋势当展示信号）：
#   保守 = 启用趋势过滤（降回撤、但摊薄收益）
#   平衡 = 仅展示趋势，不自动迁移仓位（默认）
#   进取 = 主要靠静态再平衡
risk_profile: 进取

risk_controls:              # 动作门槛：控制"能不能动"，不改变信号本身
  min_trade_amount: 500      # 单笔低于 500 元不交易，避免碎片化
  max_weekly_trade_amount: 50000  # 单周最多投入/调整金额（按百万规模重标定：原 1 万会把 100 万建仓机械卡成约 2 年）
  first_tranche_pct: 0.15    # 0 持仓首次只使用可用现金的 15%（边学边投，节奏放慢）
  allow_trade_with_cache: false   # live 行情来自缓存时，不允许作为真实交易依据

universe:                    # ETF 池。index=估值取数用；proxy_index=长历史指数代理（回测延长样本用）
  - code: "511010"
    asset: bond
    index: null
    proxy_index: "sh000012"   # 上证国债指数（长历史代理，2003~）
  - code: "510300"
    asset: equity
    index: "沪深300"
    proxy_index: "sh000300"   # 沪深300指数（2002~）
  - code: "512890"
    asset: equity_defensive
    index: null
    proxy_index: "sh000300"   # 近似：缺长历史红利低波指数，长回测用沪深300代理（注明）
  - code: "510500"
    asset: equity
    index: "中证500"
    proxy_index: "sh000905"   # 中证500指数（2005~）
  - code: "518880"
    asset: gold
    index: null
    proxy_index: null         # 无可靠长序列（SGE金价仅2016~），长回测中剔除并按比例分摊
  # ── 拓宽权益菜单：全球分散 + 成长引擎（由观察池升入可交易池）──
  - code: "513500"
    name: "标普500ETF"
    asset: global_equity
    index: null               # QDII 无 A 股 PE 源，估值分位不适用（如实标缺失，非中性）
    proxy_index: null         # 无 Sina 长序列，长回测中剔除并按比例分摊（同黄金）
  - code: "513100"
    name: "纳指ETF"
    asset: global_growth
    index: null
    proxy_index: null
  - code: "159915"
    name: "创业板ETF"
    asset: china_growth
    index: null
    proxy_index: null         # 创业板指仅 2010~、科创50 仅 2019~，并入长回测会把"20年段"截断到最短序列；
  - code: "588000"            # 故长回测中与黄金/QDII 一样剔除并按比例分摊（长段只保留 20 年级别的宽基+债代理）
    name: "科创50ETF"
    asset: china_growth
    index: null
    proxy_index: null

watchlist:                   # 观察池：只做学习与监控，不触发交易动作（成长/全球品种已升入 universe）
  - code: "511880"
    name: "银华日利"
    role: cash_management
    asset: cash
    index: null
    note: "现金管理候选；用于学习闲置资金停泊"
  - code: "511990"
    name: "华宝添益"
    role: cash_management
    asset: cash
    index: null
    note: "现金管理候选；关注流动性与折溢价"
  - code: "511360"
    name: "短融ETF"
    role: short_bond
    asset: short_bond
    index: null
    note: "现金增强候选；有信用风险，不等同现金"

factors:
  trend_filter:              # 趋势过滤：价格 vs 长期均线，跌破=风险关闭信号
    enabled: true            # 注：live 周报里趋势仅作"展示信号"，不自动调仓；回测里才作硬规则
    ma_days: 200
  momentum:                  # 动量：约 3 个月涨幅，用于权益 ETF 相对强弱排名
    enabled: true
    lookback_days: 60
  valuation:                 # 估值分位：近 N 年 PE 分位，低买高减
    enabled: true
    lookback_years: 5
    cheap_pct: 0.30          # ≤30% 分位 = 偏便宜，倾向加
    rich_pct: 0.70           # ≥70% 分位 = 偏贵，倾向减
  rebalance:                 # 再平衡触发（5/25 法则）
    enabled: true
    abs_threshold_pp: 5      # 偏离目标 ≥5 个百分点触发
    rel_threshold: 0.25      # 或相对偏离 ≥25% 触发

# ─────────────────────────────────────────────────────────────
# 收益/冲击假设（WS4 单一来源·可配置·有出处）——signals.py / app.py 建议权重共用这一处。
#   expected_return = 假设长期年化（目标可行性体检用，非承诺）
#   shock           = 压力情景冲击（回撤估算用，非预测；负数）
#   删掉某项即回退到 signals.py 内置默认；保留则逐键覆盖并登记来源/备注（让乐观假设暴露在明处）。
# ─────────────────────────────────────────────────────────────
assumptions:
  defaults: {shock: -0.25, expected_return: 0.05}
  sleeves:
    bond:             {expected_return: 0.030, shock: -0.03, source: "上证国债指数长期回报量级", note: "压舱缓冲、低波"}
    equity:           {expected_return: 0.070, shock: -0.30, source: "沪深300 长期回报约 6-8%（HANDOFF §1,§9）", note: "A股核心权益"}
    equity_defensive: {expected_return: 0.055, shock: -0.20, source: "红利低波，波动低于宽基", note: "防御权益"}
    gold:             {expected_return: 0.020, shock: -0.15, source: "黄金长期实际回报偏低、对冲属性", note: "分散对冲"}
    global_equity:    {expected_return: 0.080, shock: -0.30, source: "标普500 长期名义回报，略偏乐观", note: "全球分散(QDII)"}
    global_growth:    {expected_return: 0.100, shock: -0.40, source: "纳指历史高回报，含美股近因偏误、偏乐观", note: "成长引擎(QDII)、波动大"}
    china_growth:     {expected_return: 0.090, shock: -0.40, source: "创业板/科创50 成长溢价假设", note: "国内成长、波动大"}

# ─────────────────────────────────────────────────────────────
# 双向战术资产配置（TAA）——权威规格见 TACTICAL_ALLOCATION_DESIGN.md，纯函数在 engine/tactical.py。
#   enabled:false + mode:shadow = 上线初始态：只算"影子战术建议"展示，**不进入可执行调仓**。
#   通过 §13.5 验收后才改 mode:advisory。其余参数缺省即用 tactical.py 内置默认（此处可逐键覆盖）。
# ─────────────────────────────────────────────────────────────
tactical_allocation:
  enabled: false
  mode: shadow
  reserve_asset: "511010"
