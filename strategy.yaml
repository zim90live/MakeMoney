# ─────────────────────────────────────────────────────────────
# 策略骨架参数 —— 量化部分的"规则"。改这里相当于调策略，别频繁动。
# 读取方：engine/signals.py 和 engine/backtest.py（项目根目录的单份配置）。
# ─────────────────────────────────────────────────────────────

# 风险偏好（影响回测里"本策略"的推荐口径；live 周报始终把趋势当展示信号）：
#   保守 = 启用趋势过滤（降回撤、但摊薄收益）
#   平衡 = 仅展示趋势，不自动迁移仓位（默认）
#   进取 = 主要靠静态再平衡
risk_profile: 平衡

risk_controls:              # 动作门槛：控制"能不能动"，不改变信号本身
  min_trade_amount: 500      # 单笔低于 500 元不交易，避免碎片化
  max_weekly_trade_amount: 50000  # 单周最多投入/调整金额（按百万规模重标定：原 1 万会把 100 万建仓机械卡成约 2 年）
  first_tranche_pct: 0.15    # 0 持仓首次只使用可用现金的 15%（边学边投，节奏放慢）
  allow_trade_with_cache: false   # live 行情来自缓存时，不允许作为真实交易依据

universe:                    # ETF 池。index=估值取数用；proxy_index=长历史指数代理（回测延长样本用）；exposure_id=暴露身份（战略构建按它选 primary，批3：永不退回 code/proxy）
  - code: "511010"
    name: "国债ETF"
    asset: bond
    exposure_id: cn_govbond
    index: null
    proxy_index: "sh000012"   # 上证国债指数（长历史代理，2003~）
  - code: "510300"
    name: "沪深300ETF"
    asset: equity
    exposure_id: csi300
    index: "沪深300"
    proxy_index: "sh000300"   # 沪深300指数（2002~）
  - code: "512890"
    name: "红利低波ETF"
    asset: equity_defensive
    exposure_id: dividend_lowvol   # 批3：红利低波是独立暴露，绝不因 proxy=sh000300 被当成沪深300
    index: null
    valuation_csindex: "H30269"   # 中证红利低波动（512890 跟踪）；csindex 官方 PE 无长历史→按日自建累积分位
    proxy_index: "sh000300"   # 近似：缺长历史红利低波指数，长回测用沪深300代理（注明）
  - code: "510500"
    name: "中证500ETF"
    asset: equity
    exposure_id: csi500
    index: "中证500"
    proxy_index: "sh000905"   # 中证500指数（2005~）
  - code: "518880"
    name: "黄金ETF"
    asset: gold
    exposure_id: gold_cny
    index: null
    proxy_index: null         # 无可靠长序列（SGE金价仅2016~），长回测中剔除并按比例分摊
  # ── 拓宽权益菜单：全球分散 + 成长引擎（由观察池升入可交易池）──
  - code: "513500"
    name: "标普500ETF"
    asset: global_equity
    exposure_id: sp500
    index: null               # QDII 无 A 股 PE 源，估值分位不适用（如实标缺失，非中性）
    proxy_index: null         # 无 Sina 长序列，长回测中剔除并按比例分摊（同黄金）
  - code: "513100"
    name: "纳指ETF"
    asset: global_growth
    exposure_id: nasdaq100
    index: null
    proxy_index: null
  - code: "159915"
    name: "创业板ETF"
    asset: china_growth
    exposure_id: chinext
    index: null
    valuation_proxy: "创业板50"  # 创业板指无长历史 PE 源；用强相关代理「创业板50」(legulegu 2009~) 算分位，UI 标"代理·近似"
    proxy_index: null         # 创业板指仅 2010~、科创50 仅 2019~，并入长回测会把"20年段"截断到最短序列；
  - code: "588000"            # 故长回测中与黄金/QDII 一样剔除并按比例分摊（长段只保留 20 年级别的宽基+债代理）
    name: "科创50ETF"
    asset: china_growth
    exposure_id: star50
    index: null
    valuation_csindex: "000688"   # 科创50；csindex 官方 PE 无长历史→按日自建累积分位（指数 2020 才发布）
    proxy_index: null

watchlist:                   # 观察池：只做学习与监控，不触发交易动作（成长/全球品种已升入 universe）
  - code: "511880"
    name: "银华日利"
    role: cash_management
    asset: cash
    index: null
    note: "现金管理候选；用于学习闲置资金停泊"
  - code: "511990"
    name: "华宝添益"
    role: cash_management
    asset: cash
    index: null
    note: "现金管理候选；关注流动性与折溢价"
  - code: "511360"
    name: "短融ETF"
    role: short_bond
    asset: short_bond
    index: null
    note: "现金增强候选；有信用风险，不等同现金"

factors:
  trend_filter:              # 趋势过滤：价格 vs 长期均线，跌破=风险关闭信号
    enabled: true            # 注：live 周报里趋势仅作"展示信号"，不自动调仓；回测里才作硬规则
    ma_days: 200
  momentum:                  # 动量：约 3 个月涨幅，用于权益 ETF 相对强弱排名
    enabled: true
    lookback_days: 60
  valuation:                 # 估值分位：近 N 年 PE 分位，低买高减
    enabled: true
    lookback_years: 5
    cheap_pct: 0.30          # ≤30% 分位 = 偏便宜，倾向加
    rich_pct: 0.70           # ≥70% 分位 = 偏贵，倾向减
  rebalance:                 # 再平衡触发（5/25 法则）
    enabled: true
    abs_threshold_pp: 5      # 偏离目标 ≥5 个百分点触发
    rel_threshold: 0.25      # 或相对偏离 ≥25% 触发
    check_frequency: weekly  # 再平衡频率（两次再平衡最短间隔）：weekly(默认·不额外限制)/biweekly/monthly/quarterly
    circuit_breaker_pp: 15   # 熔断阈值：任一品种偏离 ≥此值，无视 check_frequency 强制可再平衡（防低频时错过崩盘）

# ─────────────────────────────────────────────────────────────
# 收益/冲击假设（WS4 单一来源·可配置·有出处）——signals.py / app.py 建议权重共用这一处。
#   expected_return = 假设长期年化（目标可行性体检用，非承诺）
#   shock           = 压力情景冲击（回撤估算用，非预测；负数）
#   删掉某项即回退到 signals.py 内置默认；保留则逐键覆盖并登记来源/备注（让乐观假设暴露在明处）。
# ─────────────────────────────────────────────────────────────
# return_haircut（§9.1）：收益区间 = central ± haircut（保守/乐观）；权威构建的"目标缺口"按保守口径。
#   sleeve 里也可单列 return_conservative/return_optimistic 显式覆盖。多情景压力(§9.3 七情景)内置于
#   signals.DEFAULT_STRESS_SCENARIOS（示意档、可在本文件加 stress_scenarios: 列表覆盖并定档严重度）。
# 批3收尾（2026-06-08，数据驱动）：成长/QDII 桶的保守/乐观区间不再用对称 ±3%，改由历史年化波动率缩放
#   （波动越大折扣越大；系数标定为让 A 股核心得到 3%），且**成长桶保守值封顶在核心权益保守值 4%**
#   （最坏情形下不假设乐观成长跑赢普通股票）。数值由 `python engine/backtest.py --return-intervals` 算出、
#   可随数据刷新复算；其余 sleeve 维持对称默认折扣。
assumptions:
  defaults: {shock: -0.25, expected_return: 0.05, return_haircut: 0.03}
  sleeves:
    bond:             {expected_return: 0.030, shock: -0.03, source: "上证国债指数长期回报量级", note: "压舱缓冲、低波"}
    equity:           {expected_return: 0.070, shock: -0.30, source: "沪深300 长期回报约 6-8%（HANDOFF §1,§9）", note: "A股核心权益"}
    equity_defensive: {expected_return: 0.055, shock: -0.20, source: "红利低波，波动低于宽基", note: "防御权益"}
    gold:             {expected_return: 0.020, shock: -0.15, source: "黄金长期实际回报偏低、对冲属性", note: "分散对冲"}
    global_equity:    {expected_return: 0.080, shock: -0.30, return_conservative: 0.0571, return_optimistic: 0.1029, source: "标普500 长期名义回报，略偏乐观；区间按波动率(18.8%)缩放", note: "全球分散(QDII)"}
    global_growth:    {expected_return: 0.100, shock: -0.40, return_conservative: 0.04, return_optimistic: 0.1261, source: "纳指历史高回报、含近因偏误；保守值封顶在核心权益(乐观成长不假设跑赢普通股票)", note: "成长引擎(QDII)、波动大"}
    china_growth:     {expected_return: 0.090, shock: -0.40, return_conservative: 0.04, return_optimistic: 0.1286, source: "创业板/科创50 成长溢价假设；ETF短史波动(31.8%)缩放、保守值封顶核心权益", note: "国内成长、波动大"}

# ─────────────────────────────────────────────────────────────
# 积木式预期收益（building-block）——把上面 assumptions 的"冻结假设"换成锚在【今天】的前瞻预期。
#   债券    = 当前国债到期收益率(YTM)，按 bond_ytm_tenor 取点（起始收益率=债券长期回报最佳单一预测器）
#   A股权益 = assumptions 的 expected_return 作"估值中性锚" + 估值回归(PE 向历史中位回归，按 reversion_years 摊销)
#   QDII/黄金 = 暂留 assumptions 假设（低置信·judgment，待第3步拆股息率+盈利增长）
#   这套只换"收益"口径；风险(压力/回撤/相关性)仍由回测与压力情景负责。删掉本块即回退内置默认。
expected_return:
  bond_ytm_tenor: "5年"            # 国债收益率曲线取点：3月/6月/1年/3年/5年/7年/10年/30年（511010=5年期国债ETF）
  valuation_reversion_years: 10    # PE 向历史中位回归的摊销年限（CMA 惯用 7~10 年；非 20 年）
  valuation_adj_cap: 0.05          # 单只估值回归对年化的最大加减（防极端 PE 读数放大估计）

# ─────────────────────────────────────────────────────────────
# 双向战术资产配置（TAA）——权威规格见 TACTICAL_ALLOCATION_DESIGN.md，纯函数在 engine/tactical.py。
#   enabled:false + mode:shadow = 上线初始态：只算"影子战术建议"展示，**不进入可执行调仓**。
#   通过 §13.5 验收后才改 mode:advisory。其余参数缺省即用 tactical.py 内置默认（此处可逐键覆盖）。
# ─────────────────────────────────────────────────────────────
tactical_allocation:
  enabled: false
  mode: shadow
  reserve_asset: "511010"

# ─────────────────────────────────────────────────────────────
# 长期投资政策书（Track C / STRATEGIC_ALLOCATION_DESIGN.md §5）——§18 十项决策已钉死（2026-06-07）。
#   这是战略引擎的"投资政策书"：Phase B/C 读它生成 strategic_weight（动锚）。
#   改它 = 改长期政策，须升 policy_version 并使活动战术周期失效。当前为**惰性记录**（Phase B 起才被读取）。
# ─────────────────────────────────────────────────────────────
strategic_policy:
  policy_version: 2
  decided_on: "2026-06-08"   # v2(批3)：黄金/防御加 5% 下限 + 解耦构建压力预算 construct_stress_budget

  # §18#1 目标收益口径：ETF 桶（8% 仅针对 ETF 风险桶；全组合预期同屏显示、不混用）
  target_return_basis: etf_bucket        # etf_bucket | whole_portfolio
  show_whole_portfolio_return: true

  # §18#2 场外稳健桶 70万：真稳健（存款/货基类）——2% 收益、近 0 冲击安全垫
  stable_assets:
    role: cash_like
    expected_return: 0.02
    stress_shock: 0.0
    liquidity: high

  # §18#3 资产角色目录 + 允许区间（容纳现状；tier=core|core_defensive|diversifier|satellite）
  roles:
    china_core_equity: {tier: core,           members: ["510300", "510500"],          range: [0.10, 0.35]}
    us_core_equity:    {tier: core,           members: ["513500"],                    range: [0.10, 0.35]}
    defensive_equity:  {tier: diversifier,    members: ["512890"],                    range: [0.05, 0.15]}  # 批3：红利低波下限 5%（所有者拍板）
    growth_satellite:  {tier: satellite,      members: ["513100", "159915", "588000"], range: [0.00, 0.20]}
    government_bond:   {tier: core_defensive, members: ["511010"],                    range: [0.05, 0.40]}
    gold:              {tier: diversifier,    members: ["518880"],                    range: [0.05, 0.15]}  # 批3：黄金下限 5%（所有者拍板，2008 危机分散器）

  # §18#4 组合级上限（采用设计默认——会约束当前 25% 成长→≤20%、纳指→≤10%）
  caps:
    non_satellite_min: 0.70          # 非卫星(core+core_defensive+diversifier)合计下限；现状 75% 已满足
    satellite_max: 0.20              # 卫星合计上限（binding：当前成长卫星 25% → ≤20%）
    single_satellite_max: 0.10       # 单一卫星上限（binding：纳指 13% → ≤10%）
    growth_factor_max: 0.20          # 成长因子合计上限（binding）
    single_country_equity_max: 0.45  # 单一国家权益上限（现状美国 34% 未触）
    single_risk_currency_exposure_max: 0.55  # 单一风险货币暴露上限；债券/现金等防御资产不触发该硬约束

  # 批3：解耦"构建用压力预算"与"展示用最大回撤"。null = 默认取 investor_profile.max_acceptable_drawdown
  # （即与当前展示口径同值、行为不变）；如需让构建比展示更严/更宽，在此显式设一个独立数值（全组合口径）。
  construct_stress_budget: null

  # §18#9 候选选择档（进取 → 收益优先；硬约束仍不可跳过，见 §10.3 词典序）
  selection_priority: return_first   # return_first | balanced | defensive_first

  # §18#5/6/7/8/10 工程默认（我提案、已批准；细则见 STRATEGIC_ALLOCATION_DESIGN.md «§18 决策记录»）：
  #   data_sources   : 折溢价/规模/成交额/申购=已有；费率=部分；跟踪误差/持仓重合=尽力取、缺失即降资格不编数
  #   admission      : 流动性5% / 容量1%（§8.2）；替换迟滞=连续2季领先 + 成本优势>3×换仓（§8.7）
  #   covariance     : Ledoit-Wolf 收缩 + 多窗口周频；数据不足退化到仅压力情景（与 Track B Phase D 同一块）
  #   stress_vectors : §9.3 七情景（全球股灾/中国股灾/美科技重估/利率急升/通胀/人民币升值/QDII溢价）
  #   projection     : 复用 Phase A 最大余数法 + 扩成受角色/上限约束的确定性投影（§10.4）
